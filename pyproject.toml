[project]
name = "hyperloop"
version = "0.1.0"
description = "Orchestrator that walks tasks through composable process pipelines using AI agents"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0.3",
    "rich>=15.0.0",
    "typer>=0.24.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.8",
    "pyright>=1.1",
    "pre-commit>=4.0",
]

[project.scripts]
hyperloop = "hyperloop.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hyperloop"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # ruff-specific
    "ANN",    # flake8-annotations
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN"]  # don't require annotations in tests
"src/hyperloop/cli.py" = ["B008"]  # typer.Option() in arg defaults is the intended API

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
reportMissingTypeStubs = false

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
branch = "main"
commit_message = "chore(release): {version}"
build_command = "uv build"

[tool.semantic_release.commit_parser_options]
# Conventional commits: feat -> minor, fix -> patch, breaking -> major
allowed_tags = ["feat", "fix", "refactor", "perf", "test", "chore", "docs", "style", "ci"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf", "refactor"]
